<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERILO CAROUSEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #575050 0%, #474b51 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.2em;
            font-weight: 600;
        }

        /* Carousel Container */
        .carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            background: #fff;
        }

        /* Custom Scrollbar */
        .carousel::-webkit-scrollbar {
            height: 6px;
        }

        .carousel::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 12px;
        }

        .carousel::-webkit-scrollbar-thumb {
            background: #000000;
            border-radius: 12px;
        }

        .carousel::-webkit-scrollbar-thumb:hover {
            background: #1e3c72;
        }

        /* Carousel Items */
        .carousel-item {
            scroll-snap-align: start;
            scroll-snap-stop: always;
            flex-shrink: 0;
            width: 100%;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-size: 3em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .carousel-item:nth-child(1) {
            background: linear-gradient(135deg, #000000 0%, #764ba2 100%);
        }

        .carousel-item:nth-child(2) {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .carousel-item:nth-child(3) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .carousel-item:nth-child(4) {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .carousel-item:nth-child(5) {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .carousel-item-text {
            text-align: center;
            z-index: 2;
        }

        .carousel-item-text p {
            font-size: 0.4em;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* Navigation Dots */
        .navigation-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
        }

        .dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: 2px solid white;
        }

        .dot:hover {
            background: white;
            transform: scale(1.15);
        }

        .dot:target {
            background: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .carousel-item {
                height: 280px;
            }

            .carousel-item-text {
                font-size: 2em;
            }

            .carousel-item-text p {
                font-size: 0.5em;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Derilo Carousel</h1>

        <div class="carousel">
            <div class="carousel-item" id="slide1">
                <div class="carousel-item-text">
                    <div>Slide 1</div>
                    <p>Click to navigate</p>
                </div>
            </div>
            <div class="carousel-item" id="slide2">
                <div class="carousel-item-text">
                    <div> Slide 2</div>
                    <p>Beautiful gradients</p>
                </div>
            </div>
            <div class="carousel-item" id="slide3">
                <div class="carousel-item-text">
                    <div> Slide 3</div>
                    <p>Smooth scrolling</p>
                </div>
            </div>
            <div class="carousel-item" id="slide4">
                <div class="carousel-item-text">
                    <div>Slide 4</div>
                    <p>Pure CSS magic</p>
                </div>
            </div>
            <div class="carousel-item" id="slide5">
                <div class="carousel-item-text">
                    <div>Slide 5</div>
                    <p>No JavaScript</p>
                </div>
            </div>
        </div>

        <!-- Navigation Dots -->
        <div class="navigation-dots">
            <a href="#slide1" class="dot"></a>
            <a href="#slide2" class="dot"></a>
            <a href="#slide3" class="dot"></a>
            <a href="#slide4" class="dot"></a>
            <a href="#slide5" class="dot"></a>
        </div>
    </div>
</body>
</html>
